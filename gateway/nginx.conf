server {
    listen 80;

    # Статические файлы фронтенда и админки
    location /static/ {
        alias /staticfiles/static/;
        expires 30d;
    }

    # API запросы
    location /api/ {
        proxy_set_header Host $http_host;
        proxy_pass http://backend:8000/api/;
    }
    
    # Админка Django
    location /admin/ {
        proxy_set_header Host $http_host;
        proxy_pass http://backend:8000/admin/;
    }

    # Все остальные запросы (включая главную страницу)
    location / {
        alias /staticfiles/;
        index index.html;
        try_files $uri $uri/ /index.html;
    }
}